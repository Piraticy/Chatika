<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1600" viewBox="0 0 1080 1600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f7fbff"/><stop offset=".52" stop-color="#fffdf8"/><stop offset="1" stop-color="#fff1ee"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#00c9dc"/><stop offset="1" stop-color="#ff7659"/></linearGradient>
    <linearGradient id="step" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#e8fbfc"/><stop offset="1" stop-color="#f5fff8"/></linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0a1221" flood-opacity=".12"/></filter>
    <style>
      .ink{fill:#0a1221;font-family:Arial,sans-serif}.muted{fill:#617b89;font-family:Arial,sans-serif}.teal{fill:#078d98;font-family:Arial,sans-serif}.white{fill:#fff;font-family:Arial,sans-serif}.small{font-size:22px}.label{font-size:20px;font-weight:800;letter-spacing:3px}.step-title{font-size:25px;font-weight:800}.step-copy{font-size:19px}.feature{font-size:20px;font-weight:800}.feature-copy{font-size:17px}
    </style>
  </defs>
  <rect width="1080" height="1600" fill="url(#bg)"/>
  <circle cx="-40" cy="250" r="270" fill="#c8f6f8" opacity=".38"/><circle cx="1120" cy="1260" r="300" fill="#ffd8ce" opacity=".34"/>
  <path d="M-20 210C170 70 300 80 430-10M-20 245C170 105 300 115 450 10M1100 1420C900 1550 790 1520 650 1620" fill="none" stroke="#4ed9e1" stroke-width="3" opacity=".22"/>

  <g transform="translate(72 62)"><rect width="76" height="76" rx="22" fill="#0a1221"/><path d="M17 27c0-8 6-14 14-14h25c8 0 14 6 14 14v15c0 8-6 14-14 14H40L24 68c-4 3-8 0-8-5V48c-1-2-2-4-2-6V27z" fill="url(#accent)"/><circle cx="36" cy="35" r="3.5" fill="#08111f"/><circle cx="45" cy="35" r="3.5" fill="#08111f"/><circle cx="54" cy="35" r="3.5" fill="#08111f"/><path d="M54 46l9 8" stroke="#00e4ef" stroke-width="4" stroke-linecap="round"/></g>
  <text x="166" y="94" class="ink" font-size="31" font-weight="800" letter-spacing="4">CHATIKA</text>
  <rect x="738" y="66" width="270" height="58" rx="29" fill="#0a1221" filter="url(#shadow)"/><circle cx="770" cy="95" r="9" fill="#6dffb0"/><text x="795" y="104" class="white" font-size="21" font-weight="800">PUBLIC BETA</text>

  <text x="72" y="197" class="label teal">KARIBU CHATIKA</text>
  <text x="72" y="252" class="ink" font-size="51" font-weight="800">Jiunge na Chatika</text>
  <text x="72" y="310" class="ink" font-size="51" font-weight="800">kwa hatua 4 rahisi.</text>
  <text x="72" y="354" class="muted" font-size="23">Ujumbe binafsi, simu, media na ushirikiano kwenye vifaa vyako vyote.</text>

  <g filter="url(#shadow)"><rect x="68" y="394" width="944" height="548" rx="34" fill="#fff" opacity=".94"/><image x="92" y="414" width="896" height="500" preserveAspectRatio="xMidYMid meet" xlink:href="chatika-device-collage-beta.png"/></g>

  <g transform="translate(72 980)">
    <g><rect width="450" height="108" rx="22" fill="url(#step)" stroke="#ccebed" stroke-width="2"/><circle cx="54" cy="54" r="28" fill="#0a1221"/><text x="45" y="64" class="white" font-size="25" font-weight="800">1</text><text x="102" y="45" class="step-title ink">Tembelea Chatika</text><text x="102" y="76" class="step-copy muted">chatika.onrender.com</text></g>
    <g transform="translate(486 0)"><rect width="450" height="108" rx="22" fill="url(#step)" stroke="#ccebed" stroke-width="2"/><circle cx="54" cy="54" r="28" fill="#0a1221"/><text x="45" y="64" class="white" font-size="25" font-weight="800">2</text><text x="102" y="45" class="step-title ink">Chagua Register</text><text x="102" y="76" class="step-copy muted">Jisajili kwa akaunti mpya.</text></g>
    <g transform="translate(0 126)"><rect width="450" height="108" rx="22" fill="url(#step)" stroke="#ccebed" stroke-width="2"/><circle cx="54" cy="54" r="28" fill="#0a1221"/><text x="45" y="64" class="white" font-size="25" font-weight="800">3</text><text x="102" y="45" class="step-title ink">Tengeneza wasifu wako</text><text x="102" y="76" class="step-copy muted">Jina, nenosiri na picha.</text></g>
    <g transform="translate(486 126)"><rect width="450" height="108" rx="22" fill="url(#step)" stroke="#ccebed" stroke-width="2"/><circle cx="54" cy="54" r="28" fill="#0a1221"/><text x="45" y="64" class="white" font-size="25" font-weight="800">4</text><text x="102" y="45" class="step-title ink">Kubaliwa &amp; kuingia</text><text x="102" y="76" class="step-copy muted">Anza mazungumzo yako.</text></g>
  </g>

  <text x="72" y="1375" class="label teal">UKIWA NDANI</text>
  <g transform="translate(72 1400)"><rect width="220" height="70" rx="18" fill="#e7f8fa"/><text x="24" y="31" class="feature ink">Chat na makundi</text><text x="24" y="54" class="feature-copy muted">Mazungumzo binafsi</text></g>
  <g transform="translate(310 1400)"><rect width="220" height="70" rx="18" fill="#e9fff3"/><text x="24" y="31" class="feature ink">Sauti na video</text><text x="24" y="54" class="feature-copy muted">Simu kwenye vifaa vyote</text></g>
  <g transform="translate(548 1400)"><rect width="220" height="70" rx="18" fill="#fff0ec"/><text x="24" y="31" class="feature ink">Shiriki media</text><text x="24" y="54" class="feature-copy muted">Picha, video, sauti</text></g>
  <g transform="translate(786 1400)"><rect width="222" height="70" rx="18" fill="#edf5ff"/><text x="24" y="31" class="feature ink">Shiriki skrini</text><text x="24" y="54" class="feature-copy muted">Fanya kazi pamoja</text></g>

  <text x="72" y="1530" class="muted small">Tafuta marafiki walio mtandaoni au walio karibu  ·  Web · Android · iOS · Windows · macOS · Linux</text>
  <text x="72" y="1568" class="ink" font-size="24" font-weight="800">Baada ya kuingia mara ya kwanza, Chatika itakukumbuka.</text>
</svg>
